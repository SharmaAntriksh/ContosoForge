name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          # Matches .python-version and requires-python (>=3.13).
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — advisory, non-blocking
        # The repo has a pre-existing ruff backlog, so this surfaces issues
        # without blocking merges. Remove continue-on-error once it's clean.
        run: ruff check .
        continue-on-error: true

      - name: Run tests
        run: pytest
